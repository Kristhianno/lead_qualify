<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban de Leads | Driva</title>
<style>
  :root {
    --accent: #003355;
    --accent-light: #0d4d78;
    --accent-soft: rgba(0, 51, 85, 0.06);
    --gold: #b08d57;
    --bg-top: #eef2f6;
    --bg-bottom: #dde5ec;
    --card-bg: #ffffff;
    --text: #16232e;
    --text-muted: #6b7686;
    --border: #dfe4ea;
    --error: #b3261e;
    --success: #1f7a3d;
    --hot: #c0392b;
    --hot-soft: rgba(192, 57, 43, 0.06);
    --warn: #b08d57;
    --warn-soft: rgba(176, 141, 87, 0.08);
    --cold: #8a94a3;
    --cold-soft: rgba(138, 148, 163, 0.08);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(0, 51, 85, 0.06), transparent 60%),
      radial-gradient(900px 500px at 100% 110%, rgba(176, 141, 87, 0.08), transparent 60%),
      linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 1280px;
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: "";
    width: 18px;
    height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--accent);
    margin: 0 0 6px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.92rem;
    margin: 0;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .back-link {
    color: var(--accent);
    font-size: 0.88rem;
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s ease;
  }

  .back-link:hover {
    border-color: var(--accent);
  }

  #refreshBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 11px 20px;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 10px 20px -8px rgba(0, 51, 85, 0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  }

  #refreshBtn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 14px 24px -8px rgba(0, 51, 85, 0.45);
  }

  #refreshBtn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    box-shadow: none;
  }

  .load-error {
    display: none;
    background: #fbeceb;
    color: var(--error);
    border: 1px solid rgba(179, 38, 30, 0.15);
    border-radius: 9px;
    padding: 13px 16px;
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  .load-error.show {
    display: block;
  }

  .loading-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.92rem;
    padding: 40px 0;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .board {
      grid-template-columns: 1fr;
    }
  }

  .column {
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    min-height: 120px;
  }

  .column.hot {
    background: var(--hot-soft);
    border: 1px solid rgba(192, 57, 43, 0.25);
    box-shadow: 0 12px 28px -16px rgba(192, 57, 43, 0.35);
  }

  .column.warn {
    background: var(--warn-soft);
    border: 1px solid rgba(176, 141, 87, 0.25);
  }

  .column.cold {
    background: var(--cold-soft);
    border: 1px solid rgba(138, 148, 163, 0.25);
  }

  .column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    padding: 0 4px;
  }

  .column-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .column-count {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-muted);
    background: rgba(255, 255, 255, 0.7);
    border-radius: 999px;
    padding: 2px 10px;
  }

  .column-empty {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
    padding: 24px 8px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lead-card {
    background: var(--card-bg);
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(16, 24, 40, 0.05);
    padding: 16px 18px;
  }

  .lead-card .empresa {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    margin: 0 0 4px;
    line-height: 1.3;
  }

  .lead-card .contato-linha {
    font-size: 0.86rem;
    color: var(--text);
    margin: 0 0 10px;
  }

  .lead-card .contato-linha .ticket {
    color: var(--text-muted);
  }

  .lead-card .cnpj {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    margin: 0 0 10px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .tag.segmento {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .tag.situacao-ativa {
    background: rgba(31, 122, 61, 0.1);
    color: var(--success);
  }

  .tag.situacao-outra {
    background: rgba(179, 38, 30, 0.08);
    color: var(--error);
  }

  .contact-info {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 10px;
    word-break: break-word;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    font-size: 0.72rem;
    color: #9aa3b0;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 2px;
  }

  @media (max-width: 480px) {
    .card-footer {
      flex-direction: column;
      gap: 2px;
    }
  }
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <div>
      <span class="eyebrow">Driva</span>
      <h1>Kanban de Leads</h1>
      <p class="subtitle">Leads capturados, enriquecidos e classificados automaticamente pelo n8n.</p>
    </div>
    <div class="actions">
      <a class="back-link" href="index.html">&larr; Voltar ao formulário</a>
      <button type="button" id="refreshBtn">Atualizar</button>
    </div>
  </div>

  <div class="load-error" id="loadError">Não foi possível carregar os leads. Tente atualizar novamente em instantes.</div>
  <div class="loading-state" id="loadingState">Carregando leads...</div>

  <div class="board" id="board" style="display: none;">
    <section class="column hot">
      <div class="column-header">
        <span class="column-title">🔥 Quentes</span>
        <span class="column-count" id="count-quente">0</span>
      </div>
      <div class="cards" id="cards-quente"></div>
    </section>

    <section class="column warn">
      <div class="column-header">
        <span class="column-title">🟡 Em Atenção</span>
        <span class="column-count" id="count-atencao">0</span>
      </div>
      <div class="cards" id="cards-atencao"></div>
    </section>

    <section class="column cold">
      <div class="column-header">
        <span class="column-title">⚪ Desqualificados</span>
        <span class="column-count" id="count-desqualificado">0</span>
      </div>
      <div class="cards" id="cards-desqualificado"></div>
    </section>
  </div>
</div>

<script>
  // URL de produção do webhook GET do n8n (path /webhook/leads-kanban).
  const LEADS_API_URL = "https://automacoes-n8n.m5jmff.easypanel.host/webhook/leads-kanban";

  const board = document.getElementById('board');
  const loadingState = document.getElementById('loadingState');
  const loadError = document.getElementById('loadError');
  const refreshBtn = document.getElementById('refreshBtn');

  const COLUMNS = ['quente', 'atencao', 'desqualificado'];

  function formatCurrencyBRL(value) {
    const num = Number(value);
    if (!value || isNaN(num)) return 'Não informado';
    const formatted = num.toLocaleString('pt-BR', {
      style: 'currency',
      currency: 'BRL',
      maximumFractionDigits: 0
    });
    return formatted + '/mês';
  }

  function formatCNPJ(raw) {
    if (!raw) return 'CNPJ não informado';
    const clean = String(raw).toUpperCase().replace(/[^A-Z0-9]/g, '');
    let out = '';
    for (let i = 0; i < clean.length; i++) {
      if (i === 2 || i === 5) out += '.';
      if (i === 8) out += '/';
      if (i === 12) out += '-';
      out += clean[i];
    }
    return out;
  }

  function formatTimestamp(ts) {
    if (!ts) return 'Data não informada';
    const date = new Date(ts);
    if (isNaN(date.getTime())) return 'Data não informada';
    return date.toLocaleString('pt-BR', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  function escapeHtml(value) {
    const div = document.createElement('div');
    div.textContent = value == null ? '' : String(value);
    return div.innerHTML;
  }

  function buildCard(lead) {
    const empresaNome = lead.razao_social || lead.empresa || 'Empresa não identificada';
    const situacao = (lead.situacao_cadastral || '').toUpperCase();
    const situacaoClass = situacao === 'ATIVA' ? 'situacao-ativa' : 'situacao-outra';

    const tagsHtml = [
      lead.cnae_descricao ? `<span class="tag segmento">${escapeHtml(lead.cnae_descricao)}</span>` : '',
      lead.situacao_cadastral ? `<span class="tag ${situacaoClass}">${escapeHtml(lead.situacao_cadastral)}</span>` : ''
    ].join('');

    return `
      <article class="lead-card">
        <p class="empresa">${escapeHtml(empresaNome)}</p>
        <p class="contato-linha">${escapeHtml(lead.nome || 'Contato não informado')} &middot; <span class="ticket">${escapeHtml(formatCurrencyBRL(lead.ticket_medio_mensal))}</span></p>
        <p class="cnpj">${escapeHtml(formatCNPJ(lead.cnpj))}</p>
        <div class="tags">${tagsHtml}</div>
        <div class="contact-info">
          ${escapeHtml(lead.email || 'Email não informado')}<br>
          ${escapeHtml(lead.telefone_lead || 'Telefone não informado')}
        </div>
        <div class="card-footer">
          <span>${escapeHtml(lead.fonte_enriquecimento || 'Fonte não informada')}</span>
          <span>${escapeHtml(formatTimestamp(lead.timestamp))}</span>
        </div>
      </article>
    `;
  }

  function renderBoard(leads) {
    const grouped = { quente: [], atencao: [], desqualificado: [] };

    leads.forEach(lead => {
      if (grouped[lead.tier]) {
        grouped[lead.tier].push(lead);
      }
    });

    COLUMNS.forEach(tier => {
      grouped[tier].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      const container = document.getElementById('cards-' + tier);
      document.getElementById('count-' + tier).textContent = grouped[tier].length;

      if (grouped[tier].length === 0) {
        container.innerHTML = '<p class="column-empty">Nenhum lead nesta coluna.</p>';
      } else {
        container.innerHTML = grouped[tier].map(buildCard).join('');
      }
    });
  }

  async function loadLeads() {
    loadingState.style.display = 'block';
    loadError.classList.remove('show');
    board.style.display = 'none';
    refreshBtn.disabled = true;
    const originalText = refreshBtn.textContent;
    refreshBtn.textContent = 'Atualizando...';

    try {
      const response = await fetch(LEADS_API_URL);

      if (!response.ok) {
        throw new Error('Resposta não-2xx do servidor: ' + response.status);
      }

      const data = await response.json();
      const leads = Array.isArray(data.leads) ? data.leads : [];

      renderBoard(leads);
      board.style.display = 'grid';
    } catch (err) {
      loadError.classList.add('show');
    } finally {
      loadingState.style.display = 'none';
      refreshBtn.disabled = false;
      refreshBtn.textContent = originalText;
    }
  }

  refreshBtn.addEventListener('click', loadLeads);

  loadLeads();
</script>

</body>
</html>
